<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution Motors - Meu Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --bs-body-bg: #121212; --bs-body-color: #e0e0e0; --bs-dark-card: #1e1e1e; --bs-accent: #e65100; }
        body { background-color: var(--bs-body-bg); color: var(--bs-body-color); min-height: 100vh; display: flex; flex-direction: column; }
        .card { background-color: var(--bs-dark-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; }
        .form-control { background-color: #2c2c2c; color: white; border: 1px solid #444; }
        .form-control:focus { background-color: #2c2c2c; color: white; border-color: var(--bs-accent); box-shadow: none; }
        .kpi-card { padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; color: white;}
        .kpi-gastos { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }
        .chat-btn-floating { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background-color: var(--bs-accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 1000; }
        .chat-messages { height: 50vh; overflow-y: auto; padding: 15px; background-color: #121212; }
        .message { margin-bottom: 10px; max-width: 85%; padding: 12px; border-radius: 15px; }
        .message.cliente { background-color: var(--bs-accent); color: white; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 0; }
        .message.admin { background-color: #2c2c2c; color: white; align-self: flex-start; margin-right: auto; border-bottom-left-radius: 0; }
    </style>
</head>
<body>
    <div id="toastContainer" style="position: fixed; top: 20px; right: 20px; z-index: 1055;"></div>

    <div id="loginScreen" class="d-flex flex-column justify-content-center align-items-center vh-100">
        <h1 style="color: var(--bs-accent); font-weight: 800;">EVOLUTION</h1><h4 class="mb-4">Portal do Cliente</h4>
        <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
            <form id="loginForm">
                <div class="mb-3"><label>Seu E-mail</label><input type="email" class="form-control" id="loginEmail" required></div>
                <div class="mb-4"><label>Sua Senha</label><input type="password" class="form-control" id="loginPassword" required></div>
                <button type="submit" class="btn btn-warning w-100 fw-bold">Acessar</button>
            </form>
        </div>
    </div>

    <div id="dashboardArea" style="display: none; flex-grow: 1;">
        <nav class="navbar navbar-dark bg-dark px-3 border-bottom border-warning">
            <span class="navbar-brand fw-bold text-warning"><i class="bi bi-speedometer2"></i> Meu Portal</span>
            <button class="btn btn-outline-light btn-sm" onclick="clientLogout()"><i class="bi bi-box-arrow-right"></i> Sair</button>
        </nav>
        <div class="container mt-4">
            <h3 id="welcomeMsg" class="mb-4"></h3>
            <div class="row">
                <div class="col-md-6"><div class="kpi-card kpi-gastos shadow"><p><i class="bi bi-wallet2"></i> Investimento Total</p><h3 id="kpiTotalGasto">R$ 0,00</h3></div></div>
                <div class="col-md-6"><div class="kpi-card shadow" id="kpiAlertCard"><p><i class="bi bi-tools"></i> Status Manutenção</p><h3 id="kpiStatus">Verificando...</h3><small id="kpiSub"></small></div></div>
            </div>
            
            <h5 class="text-warning mt-4"><i class="bi bi-gear-fill"></i> Serviços em Andamento</h5>
            <div id="currentServicesList" class="mb-4"></div>

            <h5 class="text-warning mt-4"><i class="bi bi-motorcycle"></i> Minhas Motos</h5>
            <div class="row" id="myMotosList"></div>
        </div>
        <div class="chat-btn-floating" data-bs-toggle="modal" data-bs-target="#chatModal"><i class="bi bi-chat-dots-fill"></i></div>
    </div>

    <!-- Modal Chat -->
    <div class="modal fade" id="chatModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header bg-warning"><h5 class="modal-title text-dark">Falar com a Oficina</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body p-0"><div class="chat-messages d-flex flex-column" id="clientChatMessages"></div><div class="p-3 bg-dark d-flex gap-2"><input type="text" class="form-control" id="clientMsgInput" placeholder="Mensagem..."><button class="btn btn-warning" onclick="enviarChat()"><i class="bi bi-send"></i></button></div></div></div></div></div>

    <!-- Modal Checklist -->
    <div class="modal fade" id="checklistModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header bg-dark"><h5 class="modal-title text-white">Inspeção de Entrada</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body" id="chkBody"></div></div></div></div>

    <script>
        // AS MESMAS CHAVES REAIS DO INDEX
        const firebaseConfig = {
            apiKey: "AIzaSyAq6gEJlUGuzJmrNf-lVY0cqdOWsJ9xNeo",
            authDomain: "evolution-179d0.firebaseapp.com",
            projectId: "evolution-179d0",
            storageBucket: "evolution-179d0.firebasestorage.app",
            messagingSenderId: "349908951188",
            appId: "1:349908951188:web:457832d484a83f45b19481"
        };
        let firebaseApp, auth, db, loggedClienteId;

        function showToast(msg) { const t=document.getElementById('toastContainer'); t.innerHTML=`<div class="toast show bg-danger text-white p-2">${msg}</div>`; setTimeout(()=>t.innerHTML='', 4000); }

        document.addEventListener('DOMContentLoaded', () => {
            firebaseApp = firebase.initializeApp(firebaseConfig); auth = firebaseApp.auth(); db = firebaseApp.firestore();
            auth.onAuthStateChanged(async u => {
                if(u) {
                    document.getElementById('loginScreen').style.display='none';
                    const snap = await db.collection('clientes').where('email','==',u.email).get();
                    if(!snap.empty) {
                        loggedClienteId = snap.docs[0].id;
                        document.getElementById('welcomeMsg').innerHTML = `Olá, <span class="text-warning">${snap.docs[0].data().nome}</span>!`;
                        document.getElementById('dashboardArea').style.display='flex';
                        startListeners();
                    } else { auth.signOut(); showToast("Perfil não encontrado."); }
                } else { document.getElementById('dashboardArea').style.display='none'; document.getElementById('loginScreen').style.display='flex'; }
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            try { await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); } 
            catch(err) { showToast("E-mail ou senha incorretos."); console.error(err); }
        });

        function clientLogout() { auth.signOut(); }

        let motos=[], servicos=[];
        function startListeners() {
            db.collection('motos').where('clienteId','==',loggedClienteId).onSnapshot(s => { motos=s.docs.map(d=>({id:d.id,...d.data()})); renderUi(); });
            db.collection('servicos').where('clienteId','==',loggedClienteId).onSnapshot(s => { servicos=s.docs.map(d=>({id:d.id,...d.data()})); renderUi(); });
            db.collection('mensagens').where('clienteId','==',loggedClienteId).orderBy('timestamp','asc').onSnapshot(s => {
                const area = document.getElementById('clientChatMessages'); area.innerHTML='';
                s.docs.forEach(doc => { const m=doc.data(); area.innerHTML+=`<div class="message ${m.sender}"><small class="opacity-50">${m.sender==='admin'?'Oficina':'Você'}</small><br>${m.text}</div>`; });
                area.scrollTop = area.scrollHeight;
            });
        }

        function renderUi() {
            // Motos
            document.getElementById('myMotosList').innerHTML = motos.map(m=>`<div class="col-md-6"><div class="card p-3 mb-3"><h5 class="text-warning">${m.modelo}</h5><span class="badge bg-secondary mb-2">${m.placa}</span><small>KM: ${m.km||'-'}</small></div></div>`).join('');
            
            // Serviços
            const ativos = servicos.filter(s=>s.status!=='Concluido' && s.status!=='Cancelado');
            document.getElementById('currentServicesList').innerHTML = ativos.length ? ativos.map(s=>{
                const m=motos.find(x=>x.id===s.motoId)||{};
                const btn = s.check ? `<button class="btn btn-sm btn-outline-warning mt-2 w-100" onclick="viewChk('${s.id}')">Ver Inspeção da Moto</button>` : '';
                return `<div class="card p-3 mb-2 border-warning"><div class="d-flex justify-content-between"><h6 class="text-white">${s.desc}</h6><span class="badge bg-primary">${s.status}</span></div><small>${m.modelo} (${m.placa})</small>${btn}</div>`;
            }).join('') : '<div class="text-white-50">Nenhum serviço em andamento.</div>';

            // KPIs
            const gasto = servicos.filter(s=>s.status==='Concluido').reduce((a,b)=>a+(b.total||0), 0);
            document.getElementById('kpiTotalGasto').innerText = `R$ ${gasto.toFixed(2)}`;
            const precisaRev = servicos.some(s=> s.status==='Concluido' && (new Date()-new Date(s.data))/(1000*60*60*24*30) > 6);
            const kCard = document.getElementById('kpiAlertCard');
            if(precisaRev) { kCard.style.background="linear-gradient(135deg, #b71c1c, #e53935)"; document.getElementById('kpiStatus').innerText="Atenção"; document.getElementById('kpiSub').innerText="Revisão pendente (mais de 6 meses)."; }
            else { kCard.style.background="linear-gradient(135deg, #2e7d32, #43a047)"; document.getElementById('kpiStatus').innerText="Tudo em Dia"; document.getElementById('kpiSub').innerText="Motos revisadas."; }
        }

        function viewChk(id) {
            const s = servicos.find(x=>x.id===id);
            const i = (ok) => ok?'<i class="bi bi-check-circle text-success"></i>':'<i class="bi bi-x-circle text-danger"></i>';
            document.getElementById('chkBody').innerHTML = `<p>Combustível: ${s.check.comb}</p><p>${i(s.check.painel)} Painel</p><p>${i(s.check.pneus)} Pneus</p><p>${i(s.check.care)} Carenagem</p><hr><small class="text-warning">Obs Oficina: ${s.check.obs||'Nenhuma.'}</small>`;
            new bootstrap.Modal(document.getElementById('checklistModal')).show();
        }

        async function enviarChat() {
            const txt = document.getElementById('clientMsgInput').value; if(!txt) return;
            await db.collection('mensagens').add({clienteId:loggedClienteId, sender:'cliente', text:txt, timestamp:firebase.firestore.FieldValue.serverTimestamp()});
            document.getElementById('clientMsgInput').value='';
        }
    </script>
</body>
</html>
