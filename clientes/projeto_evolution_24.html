<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portal - Evolution Motors</title>
    <!-- Firebase SDKs (Apenas Banco de Dados) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; }
        .form-control { background-color: #2c2c2c; color: white; border: 1px solid #444; }
        .form-control:focus { background-color: #2c2c2c; color: white; border-color: #e65100; box-shadow: none; }
        
        .kpi-card { padding: 25px; border-radius: 12px; text-align: center; margin-bottom: 20px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .kpi-gastos { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); border: 1px solid #2a5298;}
        
        .os-box { background-color: #000000; padding: 20px; border-radius: 12px; border-left: 5px solid #e65100; margin-bottom: 20px; }
        
        /* Chat Box Central e Visível */
        .chat-app { background-color: #1e1e1e; border-radius: 12px; border: 1px solid #444; overflow: hidden; height: 400px; display: flex; flex-direction: column; }
        .chat-view { flex-grow: 1; padding: 15px; overflow-y: auto; background-color: #000000; }
        .msg { max-width: 80%; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 0.95rem; }
        .msg.cliente { background-color: #e65100; color: white; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 0; }
        .msg.admin { background-color: #333; color: white; align-self: flex-start; margin-right: auto; border-bottom-left-radius: 0; }
        .msg small { display: block; text-align: right; opacity: 0.7; font-size: 0.7rem; margin-top: 4px; }
        .chat-send { display: flex; padding: 10px; background-color: #1e1e1e; border-top: 1px solid #333; }
        
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1055; }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <!-- TELA DE LOGIN DO CLIENTE (Faz busca direta no banco de dados, imune a bloqueios) -->
    <div id="loginScreen" class="d-flex flex-column justify-content-center align-items-center vh-100">
        <div class="text-center mb-4">
            <h1 style="color: #e65100; font-weight: 900; letter-spacing: 2px;">EVOLUTION</h1>
            <h5 class="text-white-50">Portal Exclusivo do Cliente</h5>
        </div>
        <div class="card p-4 shadow-lg" style="width: 100%; max-width: 400px;">
            <form id="formLoginCliente">
                <div class="mb-3">
                    <label class="form-label text-white fw-bold">E-mail Cadastrado</label>
                    <input type="email" class="form-control form-control-lg" id="loginEmail" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-white fw-bold">Senha de Acesso</label>
                    <input type="password" class="form-control form-control-lg" id="loginSenha" required>
                </div>
                <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold" id="btnEntrarApp">ACESSAR MINHAS MOTOS</button>
            </form>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL DO CLIENTE -->
    <div id="appPanel" style="display: none; flex-grow: 1;">
        <nav class="navbar navbar-dark bg-black px-4 py-3 border-bottom border-warning">
            <span class="navbar-brand fw-bold text-warning fs-4"><i class="bi bi-speedometer me-2"></i> Meu App</span>
            <button class="btn btn-outline-light btn-sm fw-bold" onclick="sairDoApp()"><i class="bi bi-box-arrow-right"></i> Sair</button>
        </nav>
        
        <div class="container mt-4 pb-5">
            <h3 id="boasVindas" class="mb-4 text-white fw-bold"></h3>
            
            <div class="row g-4 mb-5">
                <div class="col-md-6">
                    <div class="kpi-card kpi-gastos">
                        <p class="text-white-50 fw-bold mb-2"><i class="bi bi-wallet2"></i> Gasto Histórico em Revisões</p>
                        <h2 id="kpiGastoTotal" class="fw-bold mb-0">R$ 0,00</h2>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="kpi-card shadow" id="kpiAlerta">
                        <p class="text-white-50 fw-bold mb-2"><i class="bi bi-shield-check"></i> Status Padrão Ouro</p>
                        <h2 id="kpiStatus" class="fw-bold mb-1">Analisando...</h2>
                        <small id="kpiSubStatus" class="text-white"></small>
                    </div>
                </div>
            </div>

            <div class="row">
                <!-- Coluna Esquerda: Motos e Serviços -->
                <div class="col-lg-6 mb-4">
                    <h4 class="text-warning fw-bold mb-3 border-bottom border-secondary pb-2"><i class="bi bi-tools"></i> Acompanhamento de Serviços</h4>
                    <div id="boxServicos" class="mb-5">
                        <!-- OS renderizadas aqui -->
                    </div>

                    <h4 class="text-warning fw-bold mb-3 border-bottom border-secondary pb-2"><i class="bi bi-motorcycle"></i> Minha Garagem</h4>
                    <div class="row g-3" id="boxMotos">
                        <!-- Motos renderizadas aqui -->
                    </div>
                </div>

                <!-- Coluna Direita: Fale Conosco (Chat Fixo na Tela) -->
                <div class="col-lg-6 mb-4">
                    <h4 class="text-warning fw-bold mb-3 border-bottom border-secondary pb-2"><i class="bi bi-chat-right-text"></i> Fale com o Mecânico</h4>
                    <div class="chat-app shadow-lg border border-warning">
                        <div class="chat-view d-flex flex-column" id="chatAreaMsg"></div>
                        <div class="chat-send">
                            <input type="text" class="form-control rounded-pill px-3" id="chatInputMsg" placeholder="Dúvidas sobre o orçamento?">
                            <button class="btn btn-warning rounded-circle ms-2 fw-bold" style="width: 45px; height: 45px;" onclick="enviarMensagemParaOficina()"><i class="bi bi-send-fill"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Padrão Branco no Preto para ver o Checklist da OS -->
    <div class="modal fade" id="modalChecklistCliente" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary">
                <div class="modal-header bg-black border-bottom border-warning">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-clipboard-check text-success"></i> Laudo de Entrada da Moto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-white" id="corpoLaudo">
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // =========================================================================
        // CONFIGURAÇÕES DO BANCO DE DADOS
        // =========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAq6gEJlUGuzJmrNf-lVY0cqdOWsJ9xNeo",
            authDomain: "evolution-179d0.firebaseapp.com",
            projectId: "evolution-179d0",
            storageBucket: "evolution-179d0.firebasestorage.app",
            messagingSenderId: "349908951188",
            appId: "1:349908951188:web:457832d484a83f45b19481"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let idMeuCliente = null;
        let minhasMotos = [];
        let meusServicos = [];

        function showToast(msg, type='info') {
            const tc = document.getElementById('toastContainer');
            const bg = type==='error'?'bg-danger':(type==='success'?'bg-success':'bg-primary');
            tc.innerHTML = `<div class="toast show align-items-center text-white ${bg} border-0 shadow-lg p-2"><div class="d-flex"><div class="toast-body fw-bold">${msg}</div></div></div>`;
            setTimeout(()=>tc.innerHTML='', 4000);
        }

        // =========================================================================
        // LÓGICA DE LOGIN BLINDADA (BUSCA DIRETA NO BANCO)
        // Isso ignora completamente as regras chatas de Auth do Google.
        // =========================================================================
        document.getElementById('formLoginCliente').addEventListener('submit', async function(e) {
            e.preventDefault();
            const emai = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginSenha').value.trim();
            const btn = document.getElementById('btnEntrarApp');
            btn.innerHTML = "Verificando Credenciais...";
            btn.disabled = true;

            try {
                // Busca na coleção 'clientes' exata correspondência.
                const snapshot = await db.collection('clientes').where('email', '==', emai).where('senhaProv', '==', pass).get();
                
                if (snapshot.empty) {
                    showToast("E-mail ou senha incorretos. Tente novamente.", "error");
                    btn.innerHTML = "ACESSAR MINHAS MOTOS";
                    btn.disabled = false;
                } else {
                    idMeuCliente = snapshot.docs[0].id;
                    const dados = snapshot.docs[0].data();
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('appPanel').style.display = 'flex';
                    document.getElementById('boasVindas').innerHTML = `Olá, <span class="text-warning">${dados.nome}</span>!`;
                    
                    iniciarAppEmTempoReal();
                    showToast("Bem-vindo de volta!", "success");
                }
            } catch (err) {
                console.error(err);
                showToast("Erro ao conectar no banco.", "error");
                btn.innerHTML = "ACESSAR MINHAS MOTOS";
                btn.disabled = false;
            }
        });

        function sairDoApp() { window.location.reload(); }

        // =========================================================================
        // APLICATIVO DO CLIENTE (BUSCA EM TEMPO REAL)
        // =========================================================================
        function iniciarAppEmTempoReal() {
            // Minhas Motos
            db.collection('motos').where('clienteId', '==', idMeuCliente).onSnapshot(snap => {
                minhasMotos = snap.docs.map(d=>({id: d.id, ...d.data()}));
                renderizarPainel();
            });

            // Meus Serviços (OS)
            db.collection('servicos').where('clienteId', '==', idMeuCliente).onSnapshot(snap => {
                meusServicos = snap.docs.map(d=>({id: d.id, ...d.data()}));
                renderizarPainel();
            });

            // Meu Chat Privado
            db.collection('mensagens').where('clienteId', '==', idMeuCliente).orderBy('timestamp', 'asc').onSnapshot(snap => {
                const area = document.getElementById('chatAreaMsg');
                area.innerHTML = '';
                if(snap.empty) {
                    area.innerHTML = '<div class="text-center text-white-50 mt-5"><i class="bi bi-chat-square-dots fs-2"></i><br>Converse com a Evolution!</div>';
                } else {
                    snap.docs.forEach(doc => {
                        const m = doc.data();
                        const time = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
                        area.innerHTML += `<div class="msg ${m.sender}">${m.text}<small>${time}</small></div>`;
                    });
                    area.scrollTop = area.scrollHeight;
                }
            });
        }

        function renderizarPainel() {
            // Garagem
            const boxM = document.getElementById('boxMotos');
            if(minhasMotos.length === 0) boxM.innerHTML = '<div class="col-12"><p class="text-white-50">Você ainda não tem motos associadas.</p></div>';
            else {
                boxM.innerHTML = minhasMotos.map(m => `
                    <div class="col-12">
                        <div class="p-3 bg-black rounded border border-secondary shadow-sm d-flex align-items-center gap-3">
                            ${m.img?`<img src="${m.img}" width="80" class="rounded border border-warning">`:'<div class="bg-dark p-3 rounded"><i class="bi bi-motorcycle fs-1 text-white-50"></i></div>'}
                            <div>
                                <h5 class="text-warning fw-bold mb-1">${m.modelo}</h5>
                                <span class="badge bg-secondary fs-6 mb-1">${m.placa}</span>
                                <p class="text-white-50 mb-0 small">KM Registrada: ${m.km || '0'}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Acompanhamento de OS
            const boxOS = document.getElementById('boxServicos');
            const osAndamento = meusServicos.filter(s => s.status !== 'Concluido' && s.status !== 'Cancelado');
            if(osAndamento.length === 0) boxOS.innerHTML = '<div class="p-4 bg-black rounded border border-secondary text-center text-white-50"><i class="bi bi-check-circle fs-2 text-success"></i><br>Nenhuma moto na oficina no momento.</div>';
            else {
                boxOS.innerHTML = osAndamento.map(os => {
                    const mot = minhasMotos.find(x=>x.id===os.motoId);
                    let botoesAcao = '';
                    if(os.check) {
                        botoesAcao = `<button class="btn btn-outline-warning w-100 fw-bold mt-3" onclick="abrirLaudo('${os.id}')"><i class="bi bi-search me-1"></i> Ver Laudo de Recebimento</button>`;
                    }
                    return `
                    <div class="os-box shadow-lg">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="text-white fw-bold mb-0">${os.desc}</h5>
                            <span class="badge bg-primary fs-6">${os.status}</span>
                        </div>
                        <p class="text-info fw-bold mb-1"><i class="bi bi-motorcycle me-1"></i> ${mot?mot.placa:'-'} (${mot?mot.modelo:'-'})</p>
                        <p class="text-white-50 small mb-0"><i class="bi bi-calendar-check me-1"></i> Deixada em: ${new Date(os.data).toLocaleDateString('pt-BR')}</p>
                        <p class="text-success fw-bold fs-5 mt-2 mb-0">Total: R$ ${os.total.toFixed(2)}</p>
                        ${botoesAcao}
                    </div>`;
                }).join('');
            }

            // KPI
            const gastoHistorico = meusServicos.filter(s=>s.status==='Concluido').reduce((acc, os) => acc + os.total, 0);
            document.getElementById('kpiGastoTotal').innerText = `R$ ${gastoHistorico.toFixed(2)}`;

            let tempoDesdeUltimaIda = 0;
            let temAtraso = false;
            meusServicos.filter(s=>s.status==='Concluido').forEach(os => {
                const difMeses = (new Date() - new Date(os.data)) / (1000*60*60*24*30);
                if(difMeses > 6) temAtraso = true;
            });

            const cardAlerta = document.getElementById('kpiAlerta');
            if(temAtraso) {
                cardAlerta.style.background = "linear-gradient(135deg, #b71c1c, #e53935)";
                document.getElementById('kpiStatus').innerText = "Alerta: Revisão Passada";
                document.getElementById('kpiSubStatus').innerText = "Faz mais de 6 meses que você não traz sua moto. O óleo pode estar vencido.";
            } else {
                cardAlerta.style.background = "linear-gradient(135deg, #2e7d32, #43a047)";
                document.getElementById('kpiStatus').innerText = "Tudo Perfeito!";
                document.getElementById('kpiSubStatus').innerText = "Suas motos estão com a manutenção preventiva em dia.";
            }
        }

        // Checklist / Laudo Modal
        window.abrirLaudo = function(idOs) {
            const os = meusServicos.find(x=>x.id===idOs);
            if(!os || !os.check) return;

            const chk = os.check;
            const checkIcon = (val) => val ? '<i class="bi bi-check-circle-fill text-success fs-5"></i>' : '<i class="bi bi-x-circle-fill text-danger fs-5"></i>';

            document.getElementById('corpoLaudo').innerHTML = `
                <div class="p-3 bg-black rounded border border-secondary mb-3">
                    <p class="mb-0 fw-bold"><i class="bi bi-fuel-pump text-warning me-2"></i> Nível do Tanque: <span class="text-white-50">${chk.comb}</span></p>
                </div>
                <div class="d-flex align-items-center mb-2">${checkIcon(chk.painel)} <span class="ms-2 fw-bold">Painel / Elétrica</span></div>
                <div class="d-flex align-items-center mb-2">${checkIcon(chk.pneus)} <span class="ms-2 fw-bold">Estado dos Pneus</span></div>
                <div class="d-flex align-items-center mb-3">${checkIcon(chk.care)} <span class="ms-2 fw-bold">Carenagem / Estrutura</span></div>
                <hr class="border-secondary">
                <p class="text-warning fw-bold mb-1"><i class="bi bi-exclamation-triangle-fill me-1"></i> Avarias anotadas pela oficina na chegada:</p>
                <div class="p-3 bg-secondary bg-opacity-25 rounded fst-italic border border-secondary text-white-50">
                    "${chk.obs || 'Nenhuma avaria declarada no recebimento.'}"
                </div>
            `;
            new bootstrap.Modal(document.getElementById('modalChecklistCliente')).show();
        };

        // Chat
        async function enviarMensagemParaOficina() {
            const val = document.getElementById('chatInputMsg').value.trim();
            if(!val) return;

            await db.collection('mensagens').add({
                clienteId: idMeuCliente,
                sender: 'cliente',
                text: val,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.getElementById('chatInputMsg').value = '';
        }
    </script>
</body>
</html>
