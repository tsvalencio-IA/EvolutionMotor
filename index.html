<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Evolution Motors</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bs-body-bg: #212529; 
            --bs-dark-card: #343a40; 
            --bs-accent: #e65100; 
        }
        body {
            background-color: var(--bs-body-bg);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background-color: var(--bs-dark-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }
        .card-header {
            background-color: var(--bs-accent);
            color: #ffffff;
            border-top-left-radius: calc(0.75rem - 1px);
            border-top-right-radius: calc(0.75rem - 1px);
            border-bottom: none;
            text-align: center;
            padding: 1.5rem;
        }
        .form-control {
            background-color: #495057;
            color: #ffffff;
            border-color: #6c757d;
        }
        .form-control:focus {
            background-color: #495057;
            color: #ffffff;
            border-color: var(--bs-accent);
            box-shadow: 0 0 0 0.25rem rgba(230, 81, 0, 0.25);
        }
        .form-control::placeholder { color: #adb5bd; }
        label { color: #ffffff; font-weight: 500; }
        .btn-primary { background-color: var(--bs-accent); border-color: var(--bs-accent); color: #ffffff; font-weight: bold; }
        .btn-primary:hover { background-color: #c94400; border-color: #c94400; color: #ffffff; }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <h3 class="mb-0">Evolution Motors</h3>
        </div>
        <div class="card-body p-4">
            <form id="loginForm" onsubmit="fazerLogin(event)">
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <input type="text" class="form-control" id="loginUser" placeholder="admin" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-control" id="loginPass" placeholder="123" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2" id="btnEntrar">Entrar no Sistema</button>
            </form>
            <div id="erroMsg" class="alert alert-danger mt-3 d-none text-center border-0 p-2" style="font-size: 0.9rem;">
                Usuário ou senha incorretos!
            </div>
        </div>
    </div>

    <script>
        // Trava: se já estiver logado, redireciona
        if (sessionStorage.getItem('evolution_admin_auth') === 'true') {
            if (window.location.protocol !== 'blob:') {
                window.location.replace('admin.html');
            }
        }

        function fazerLogin(e) {
            e.preventDefault();
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const msg = document.getElementById('erroMsg');

            msg.classList.add('d-none');

            // Validação direta no código (Conforme solicitado)
            if (user === 'admin' && pass === '123') {
                sessionStorage.setItem('evolution_admin_auth', 'true');
                
                // Tratamento de segurança para o ambiente de prévia não dar erro
                if (window.location.protocol === 'blob:') {
                    alert("Login Aprovado! Como estamos na prévia, o redirecionamento é bloqueado. Quando subir para o GitHub, o sistema pulará para admin.html automaticamente.");
                } else {
                    window.location.href = 'admin.html';
                }
            } else {
                msg.classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
