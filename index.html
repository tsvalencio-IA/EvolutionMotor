<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login da Oficina - Evolution Motors</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background-color: #121212; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .form-control {
            background-color: #2c2c2c;
            color: #ffffff;
            border: 1px solid #444;
            padding: 12px;
        }
        .form-control:focus {
            background-color: #2c2c2c;
            color: #ffffff;
            border-color: #e65100;
            box-shadow: 0 0 0 0.25rem rgba(230, 81, 0, 0.25);
        }
        .btn-primary {
            background-color: #e65100;
            border: none;
            font-weight: bold;
            padding: 12px;
            font-size: 1.1rem;
        }
        .btn-primary:hover {
            background-color: #c94400;
        }
        .text-white { color: #ffffff !important; }
    </style>
</head>
<body>

    <div class="login-card text-white">
        <div class="text-center mb-4">
            <h2 style="color: #e65100; font-weight: 900; letter-spacing: 2px;">EVOLUTION</h2>
            <p class="text-white-50 mb-0 fs-5">Gestão de Oficina</p>
        </div>

        <form id="formLogin">
            <div class="mb-3">
                <label class="form-label text-white fw-bold"><i class="bi bi-person-fill me-1"></i> Usuário</label>
                <input type="text" id="loginUser" class="form-control" placeholder="Digite: admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-white fw-bold"><i class="bi bi-lock-fill me-1"></i> Senha</label>
                <input type="password" id="loginPass" class="form-control" placeholder="Digite: 123" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100" id="btnEntrar">ACESSAR PAINEL</button>
        </form>

        <div id="erroMsg" class="alert alert-danger mt-3 d-none text-center fw-bold border-0">
            Usuário ou senha incorretos!
        </div>
    </div>

    <script>
        // Trava de segurança: Se já estiver logado, vai direto pro painel
        if (sessionStorage.getItem('evolution_admin_auth') === 'true') {
            window.location.replace('admin.html');
        }

        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const btn = document.getElementById('btnEntrar');
            const msg = document.getElementById('erroMsg');

            btn.innerHTML = "Autenticando...";
            btn.disabled = true;
            msg.classList.add('d-none');

            // Lógica Pura, Direta e Sem Firebase Auth
            setTimeout(() => {
                if (user === 'admin' && pass === '123') {
                    sessionStorage.setItem('evolution_admin_auth', 'true');
                    window.location.href = 'admin.html';
                } else {
                    msg.classList.remove('d-none');
                    btn.innerHTML = "ACESSAR PAINEL";
                    btn.disabled = false;
                }
            }, 500); // Meio segundo para dar tempo visual
        });
    </script>
</body>
</html>
