<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution Motors - Meu Painel</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --bs-body-bg: #212529; --bs-body-color: #f8f9fa; --bs-dark-card: #343a40; --bs-accent: #e65100; }
        body { background-color: var(--bs-body-bg); color: var(--bs-body-color); font-family: sans-serif; }
        .navbar { background-color: var(--bs-dark-card) !important; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .card { background-color: var(--bs-dark-card); border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.1); }
        
        .status-card { text-align: center; padding: 15px; border-radius: 0.75rem; margin-bottom: 15px; color: white; }
        .status-card.bg-em-andamento { background-color: #fd7e14; }
        
        /* Estilos do Modal */
        .modal-content { background-color: var(--bs-dark-card); color: var(--bs-body-color); }
        .modal-header { background-color: var(--bs-accent); color: white; border-bottom: none; }
        .btn-close { filter: invert(1); }
        
        .check-item { margin-bottom: 8px; font-size: 1.1em; }
        .check-icon-ok { color: #198754; font-weight: bold; }
        .check-icon-nok { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <div id="clientPanel" class="d-flex flex-column h-100">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand text-white fw-bold" href="#"><i class="bi bi-speedometer2 me-2"></i>Evolution Motors</a>
            </div>
        </nav>
        
        <div class="container-fluid mt-3">
            <h2 id="clientWelcomeMessage">Olá, Cliente!</h2>

            <h4 class="mt-4 mb-3"><i class="bi bi-gear me-2"></i>Status dos Serviços Atuais</h4>
            <div id="clientCurrentServicesStatus" class="row">
                <!-- Serviços Renderizados Aqui -->
            </div>
        </div>
    </div>

    <!-- Modal do Checklist de Entrada -->
    <div class="modal fade" id="checklistModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-card-checklist me-2"></i>Checklist de Recebimento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="checklistModalBody">
                    <!-- O conteúdo do checklist será injetado aqui via JS -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary w-100" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simulação de banco de dados para renderizar a interface de exemplo
        const servicos = [
            {
                id: 'os123', status: 'Em Andamento', descricaoServico: 'Revisão Geral e Troca de Óleo',
                checklist: {
                    combustivel: 'Meio Tanque', painelOk: true, retrovisoresOk: true, 
                    faroisOk: true, pneusOk: false, carenagemOk: true,
                    avarias: 'Pneu traseiro liso. Cliente ciente.'
                }
            }
        ];
        const motos = [{ id: 'm1', modelo: 'Honda CB 500F', placa: 'ABC-1234' }];

        // Função que renderiza os serviços no painel do cliente
        function loadClientServices() {
            const container = document.getElementById('clientCurrentServicesStatus');
            container.innerHTML = '';
            
            servicos.forEach(serv => {
                const moto = motos[0]; // Simulação
                
                // Botão para ver o Checklist se ele existir na OS
                let checklistBtn = '';
                if(serv.checklist) {
                    checklistBtn = `
                        <button class="btn btn-sm btn-outline-light mt-3 w-100" onclick="viewChecklist('${serv.id}')">
                            <i class="bi bi-search me-1"></i> Ver Inspeção de Entrada
                        </button>
                    `;
                }

                container.innerHTML += `
                    <div class="col-12 col-md-6">
                        <div class="status-card bg-em-andamento">
                            <h4>${serv.status}</h4>
                            <p class="fw-bold">${moto.modelo} (${moto.placa})</p>
                            <p>${serv.descricaoServico}</p>
                            ${checklistBtn}
                        </div>
                    </div>
                `;
            });
        }

        // Função chamada ao clicar em "Ver Inspeção de Entrada"
        function viewChecklist(serviceId) {
            const service = servicos.find(s => s.id === serviceId);
            if (!service || !service.checklist) return;

            const check = service.checklist;
            const body = document.getElementById('checklistModalBody');
            
            // Renderiza ícones X ou Confere dependendo do boolean
            const renderIcon = (isOk) => isOk ? '<i class="bi bi-check-circle-fill check-icon-ok me-2"></i>' : '<i class="bi bi-x-circle-fill check-icon-nok me-2"></i>';

            body.innerHTML = `
                <div class="p-3 bg-dark rounded border border-secondary mb-3">
                    <p class="mb-1"><i class="bi bi-fuel-pump text-warning me-2"></i><strong>Combustível:</strong> ${check.combustivel}</p>
                </div>
                
                <div class="check-item">${renderIcon(check.painelOk)} Painel de Instrumentos</div>
                <div class="check-item">${renderIcon(check.retrovisoresOk)} Retrovisores</div>
                <div class="check-item">${renderIcon(check.faroisOk)} Faróis e Setas</div>
                <div class="check-item">${renderIcon(check.pneusOk)} Pneus</div>
                <div class="check-item">${renderIcon(check.carenagemOk)} Carenagem/Estética</div>
                
                <hr class="border-secondary my-3">
                <h6>Avarias Relatadas no Recebimento:</h6>
                <div class="p-2 bg-secondary text-white rounded fst-italic">
                    ${check.avarias ? check.avarias : 'Nenhuma avaria pré-existente relatada.'}
                </div>
                <small class="d-block mt-3 text-white-50 text-center">Inspeção realizada no momento em que a moto foi deixada na oficina.</small>
            `;

            new bootstrap.Modal(document.getElementById('checklistModal')).show();
        }

        document.addEventListener('DOMContentLoaded', loadClientServices);
    </script>
</body>
</html>
