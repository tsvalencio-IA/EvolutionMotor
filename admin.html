<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Evolution Motors</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background-color: #212529; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background-color: #343a40;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .form-control {
            background-color: #495057;
            color: white;
            border: 1px solid #6c757d;
        }
        .form-control:focus {
            background-color: #495057;
            color: white;
            border-color: #e65100;
            box-shadow: 0 0 0 0.25rem rgba(230, 81, 0, 0.25);
        }
        .btn-primary {
            background-color: #e65100;
            border: none;
            font-weight: bold;
            padding: 0.75rem;
        }
        .btn-primary:hover {
            background-color: #c94400;
        }
    </style>
</head>
<body>

    <div class="login-card text-white">
        <div class="text-center mb-4">
            <h2 style="color: #e65100; font-weight: 800; letter-spacing: 1px;">EVOLUTION</h2>
            <p class="text-white-50 mb-0">Gestão de Oficina</p>
        </div>

        <form onsubmit="fazerLogin(event)">
            <div class="mb-3">
                <label class="form-label text-white-50"><i class="bi bi-person-fill me-1"></i> Usuário</label>
                <input type="text" id="loginUser" class="form-control" placeholder="admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-white-50"><i class="bi bi-lock-fill me-1"></i> Senha</label>
                <input type="password" id="loginPass" class="form-control" placeholder="123" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100" id="btnEntrar">Entrar no Sistema</button>
        </form>

        <div id="erroMsg" class="alert alert-danger mt-3 d-none text-center p-2 border-0" style="font-size: 0.9rem;">
            Usuário ou senha incorretos!
        </div>
    </div>

    <script>
        // Trava para evitar que volte pro login se já estiver logado
        if (sessionStorage.getItem('evolution_admin_auth') === 'true') {
            window.location.replace('admin.html');
        }

        function fazerLogin(e) {
            e.preventDefault();
            
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const btn = document.getElementById('btnEntrar');
            const msg = document.getElementById('erroMsg');

            btn.innerHTML = "<i class='bi bi-arrow-repeat spin' style='animation: spin 1s linear infinite; display: inline-block;'></i> Autenticando...";
            btn.disabled = true;
            msg.classList.add('d-none');

            // Simula um delay rápido para UX e valida a senha chumbada no código
            setTimeout(() => {
                if (user === 'admin' && pass === '123') {
                    // Cria o token de sessão local
                    sessionStorage.setItem('evolution_admin_auth', 'true');
                    // Redireciona para o arquivo separado do admin
                    window.location.href = 'admin.html';
                } else {
                    msg.classList.remove('d-none');
                    btn.innerHTML = "Entrar no Sistema";
                    btn.disabled = false;
                }
            }, 800);
        }
    </script>
</body>
</html>
